<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'">
  <title>Ancient PDF Master</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- macOS title bar drag region -->
  <div class="titlebar">
    <span class="titlebar-text">Ancient PDF Master</span>
  </div>

  <div class="container">
    <!-- Status banner -->
    <div id="tesseract-status" class="status-banner hidden">
      <span id="status-icon">⚠</span>
      <span id="status-message">Checking Tesseract...</span>
    </div>

    <!-- Input Section -->
    <section class="card">
      <h2>Input</h2>
      <div class="file-row">
        <input type="text" id="input-path" readonly placeholder="Select an image or PDF file...">
        <button id="btn-browse-input" class="btn btn-secondary">Browse</button>
      </div>
    </section>

    <!-- Output Section -->
    <section class="card">
      <h2>Output</h2>
      <div class="file-row">
        <input type="text" id="output-path" placeholder="Output path (auto-generated if empty)">
        <button id="btn-browse-output" class="btn btn-secondary">Browse</button>
      </div>
    </section>

    <!-- OCR Settings -->
    <section class="card">
      <h2>OCR Settings</h2>

      <div class="settings-group">
        <label class="settings-label">Languages</label>
        <div class="checkbox-row">
          <label class="checkbox-item">
            <input type="checkbox" id="lang-grc" checked>
            <span>Ancient Greek (Ἀρχαία Ἑλληνική)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="lang-lat" checked>
            <span>Latin (Latina)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="lang-eng" checked>
            <span>English</span>
          </label>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label" for="dpi-select">DPI (for PDF input)</label>
        <select id="dpi-select" class="select-input">
          <option value="150">150 DPI</option>
          <option value="200">200 DPI</option>
          <option value="300" selected>300 DPI (recommended)</option>
          <option value="400">400 DPI</option>
          <option value="600">600 DPI (high quality)</option>
        </select>
      </div>
    </section>

    <!-- Bilingual Split Settings -->
    <section class="card">
      <h2>
        <label class="checkbox-item" style="font-size:13px; text-transform:uppercase; letter-spacing:0.8px;">
          <input type="checkbox" id="split-enabled">
          <span>Bilingual Split</span>
        </label>
      </h2>
      <div id="split-settings" class="hidden">
        <div class="settings-group">
          <label class="settings-label">Split Pattern</label>
          <select id="split-pattern" class="select-input">
            <option value="alternating">Alternating (odd = Lang A, even = Lang B)</option>
            <option value="custom">Custom page ranges</option>
          </select>
        </div>

        <div id="split-custom" class="hidden">
          <div class="settings-group">
            <label class="settings-label" for="split-lang-a-pages">Language A pages (e.g. "1, 3, 5-10")</label>
            <input type="text" id="split-lang-a-pages" class="text-input" placeholder="odd">
          </div>
          <div class="settings-group">
            <label class="settings-label" for="split-lang-b-pages">Language B pages (e.g. "2, 4, 11-20")</label>
            <input type="text" id="split-lang-b-pages" class="text-input" placeholder="even">
          </div>
        </div>

        <div class="settings-group">
          <label class="settings-label" for="split-common-pages">Common pages to duplicate in both (e.g. "1-3, 5")</label>
          <input type="text" id="split-common-pages" class="text-input" placeholder="Leave empty if none">
        </div>

        <div class="settings-group">
          <label class="settings-label">Output file names</label>
          <div class="file-row" style="margin-bottom:6px;">
            <input type="text" id="split-output-a" placeholder="Language A output (auto-generated)">
          </div>
          <div class="file-row">
            <input type="text" id="split-output-b" placeholder="Language B output (auto-generated)">
          </div>
        </div>
      </div>
    </section>

    <!-- Page Numbering -->
    <section class="card">
      <h2>
        <label class="checkbox-item" style="font-size:13px; text-transform:uppercase; letter-spacing:0.8px;">
          <input type="checkbox" id="pagelabels-enabled">
          <span>Page Numbering</span>
        </label>
      </h2>
      <div id="pagelabels-settings" class="hidden">
        <div class="settings-group">
          <label class="settings-label">Preset</label>
          <select id="pagelabels-preset" class="select-input">
            <option value="roman-arabic">Front matter (Roman i,ii,iii) + Body (Arabic 1,2,3)</option>
            <option value="custom">Custom ranges</option>
          </select>
        </div>

        <div id="pagelabels-simple">
          <div class="settings-group">
            <label class="settings-label" for="pagelabels-body-start">Body starts at page (Arabic numbering begins)</label>
            <input type="number" id="pagelabels-body-start" class="text-input" value="1" min="1" style="width:80px;">
          </div>
        </div>

        <div id="pagelabels-custom" class="hidden">
          <div id="pagelabels-ranges"></div>
          <button id="btn-add-pagelabel" class="btn-small" style="margin-top:8px;">+ Add Range</button>
        </div>
      </div>
    </section>

    <!-- TOC Embedding -->
    <section class="card">
      <h2>
        <label class="checkbox-item" style="font-size:13px; text-transform:uppercase; letter-spacing:0.8px;">
          <input type="checkbox" id="toc-enabled">
          <span>Table of Contents</span>
        </label>
      </h2>
      <div id="toc-settings" class="hidden">
        <div id="toc-entries"></div>
        <div class="toc-actions" style="margin-top:8px; display:flex; gap:8px;">
          <button id="btn-add-toc" class="btn-small">+ Add Entry</button>
          <button id="btn-import-toc" class="btn-small">Import from Text</button>
        </div>
        <div id="toc-import-area" class="hidden" style="margin-top:8px;">
          <textarea id="toc-import-text" class="text-input" rows="6" placeholder="Paste TOC text here, one entry per line:&#10;Chapter 1 ... 5&#10;  Section 1.1 ... 8&#10;Chapter 2 ... 15"></textarea>
          <button id="btn-parse-toc" class="btn-small" style="margin-top:4px;">Parse</button>
        </div>
      </div>
    </section>

    <!-- Action Buttons -->
    <div class="action-row">
      <button id="btn-start" class="btn btn-primary" disabled>
        <span class="btn-icon">▶</span> Start OCR
      </button>
      <button id="btn-cancel" class="btn btn-danger" disabled>
        Cancel
      </button>
    </div>

    <!-- Progress -->
    <section id="progress-section" class="card hidden">
      <h2>Progress</h2>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
      </div>
      <div id="progress-text" class="progress-text">Ready</div>
    </section>

    <!-- Results Log -->
    <section class="card">
      <h2>
        Log
        <button id="btn-clear-log" class="btn-small">Clear</button>
      </h2>
      <div id="log-output" class="log-output"></div>
    </section>
  </div>

  <!-- Completion Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>OCR Complete</h3>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="btn-open-file" class="btn btn-primary">Open PDF</button>
        <button id="btn-show-folder" class="btn btn-secondary">Show in Folder</button>
        <button id="btn-modal-close" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
